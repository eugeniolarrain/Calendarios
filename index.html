<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap AutoMetrics - 20 Días</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 15px;
            color: #fff;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0 15px;
        }
        
        header {
            text-align: center;
            margin-bottom: 25px;
            padding: 15px;
        }
        
        h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .stat {
            background: rgba(255,255,255,0.1);
            padding: 15px 30px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .stat-label {
            color: #888;
            font-size: 0.95rem;
        }
        
        .phases-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 1400px) {
            .phases-grid { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 600px) {
            .phases-grid { grid-template-columns: 1fr; }
        }
        
        .phase {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .phase-header {
            padding: 14px 18px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
            flex-wrap: wrap;
            gap: 5px;
        }
        
        .phase-header:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .phase-title {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .phase-badge {
            padding: 4px 10px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.8rem;
        }
        
        .phase-1 .phase-badge { background: #22c55e; color: #000; }
        .phase-2 .phase-badge { background: #eab308; color: #000; }
        .phase-3 .phase-badge { background: #f97316; color: #000; }
        .phase-4 .phase-badge { background: #3b82f6; color: #000; }
        
        .phase-name {
            font-size: 1rem;
            font-weight: 600;
        }
        
        .phase-days {
            color: #888;
            font-size: 0.8rem;
        }
        
        .phase-progress {
            font-size: 1.1rem;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .phase-content {
            max-height: 0;
            overflow-y: auto;
            transition: max-height 0.4s ease;
            flex: 1;
        }
        
        .phase-content::-webkit-scrollbar {
            width: 6px;
        }
        
        .phase-content::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        
        .phase-content::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }
        
        .phase-content.open {
            max-height: 900px;
        }
        
        .day {
            padding: 14px 16px;
            border-top: 1px solid rgba(255,255,255,0.08);
            transition: background 0.3s;
        }
        
        .day:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .day-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        
        .day-number {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: #000;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        
        .day-title {
            flex: 1;
            min-width: 0;
        }
        
        .day-title h3 {
            font-size: 1rem;
            margin-bottom: 2px;
        }
        
        .day-title p {
            color: #888;
            font-size: 0.85rem;
        }
        
        .day-toggle {
            cursor: pointer;
            font-size: 0.9rem;
            color: #888;
            padding: 5px 10px;
            transition: color 0.2s;
            user-select: none;
            display: inline-block;
            min-width: 30px;
            text-align: center;
            position: relative;
            z-index: 10;
            background: transparent;
            border: none;
            font-family: inherit;
        }
        
        .day-toggle:hover {
            color: #00d4ff;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        
        .actions.collapsed .actions-list {
            display: none;
        }
        
        .checkbox-wrapper {
            position: relative;
        }
        
        .custom-checkbox {
            width: 28px;
            height: 28px;
            border: 2px solid #555;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            background: transparent;
        }
        
        .custom-checkbox:hover {
            border-color: #00d4ff;
        }
        
        .custom-checkbox.checked {
            background: #22c55e;
            border-color: #22c55e;
        }
        
        .custom-checkbox::after {
            content: '✓';
            color: #000;
            font-weight: bold;
            opacity: 0;
            transform: scale(0);
            transition: all 0.2s;
        }
        
        .custom-checkbox.checked::after {
            opacity: 1;
            transform: scale(1);
        }
        
        .actions {
            margin-left: 40px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 10px 12px;
        }
        
        .actions h4 {
            color: #00d4ff;
            font-size: 0.8rem;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .action-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 0;
            font-size: 0.9rem;
            color: #bbb;
            cursor: pointer;
        }
        
        .action-item::before {
            content: '→';
            color: #7c3aed;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        
        .action-item.completed {
            color: #22c55e;
            text-decoration: line-through;
        }
        
        .action-item.completed::before {
            color: #22c55e;
        }
        
        .action-checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid #555;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .action-checkbox:hover {
            border-color: #00d4ff;
        }
        
        .action-checkbox.checked {
            background: #22c55e;
            border-color: #22c55e;
        }
        
        .action-checkbox::after {
            content: '✓';
            color: #000;
            font-size: 12px;
            font-weight: bold;
            opacity: 0;
            transform: scale(0);
            transition: all 0.2s;
        }
        
        .action-checkbox.checked::after {
            opacity: 1;
            transform: scale(1);
        }
        
        .day.completed .day-title h3 {
            text-decoration: line-through;
            color: #22c55e;
        }
        
        .day.completed .day-number {
            background: #22c55e;
        }
        
        .toggle-icon {
            font-size: 1.2rem;
            transition: transform 0.3s;
            color: #888;
        }
        
        .phase-header.open .toggle-icon {
            transform: rotate(180deg);
        }
        
        .reset-btn {
            display: block;
            margin: 25px auto;
            padding: 10px 25px;
            background: rgba(255,0,0,0.2);
            border: 1px solid #ff4444;
            color: #ff4444;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        
        .reset-btn:hover {
            background: rgba(255,0,0,0.4);
        }
        
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .stats { gap: 15px; }
            .phase-name { font-size: 1rem; }
            .actions { margin-left: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🗓️ Roadmap AutoMetrics</h1>
            <p class="subtitle">20 días de trabajo • 1 hora/día</p>
        </header>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="completedDays">0</div>
                <div class="stat-label">Días Completados</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="totalDays">20</div>
                <div class="stat-label">Total Días</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="progressPercent">0%</div>
                <div class="stat-label">Progreso</div>
            </div>
        </div>

        <div class="phases-grid" id="phasesContainer"></div>
        
        <button class="reset-btn" onclick="resetAll()">🔄 Reiniciar Todo</button>
    </div>

    <script>
        const roadmapData = [
            {
                id: 'phase1',
                name: 'FASE 1: Base sólida',
                daysRange: 'Día 1–5',
                color: 'green',
                days: [
                    {
                        number: 1,
                        title: 'Crear proyecto base',
                        objective: 'Tener app corriendo local',
                        actions: [
                            'Crear proyecto con Next.js',
                            'Ejecutar npm run dev',
                            'Limpiar UI inicial (dejar página en blanco simple)',
                            'Subir repo a GitHub'
                        ]
                    },
                    {
                        number: 2,
                        title: 'Deploy inicial',
                        objective: 'App online',
                        actions: [
                            'Crear proyecto en Vercel',
                            'Conectar repo',
                            'Deploy automático',
                            'Verificar que la URL funciona'
                        ]
                    },
                    {
                        number: 3,
                        title: 'Setup autenticación base',
                        objective: 'Instalar sistema de login',
                        actions: [
                            'Instalar NextAuth.js',
                            'Crear ruta /api/auth',
                            'Configurar provider de Google'
                        ]
                    },
                    {
                        number: 4,
                        title: 'Credenciales Google + variables',
                        objective: 'Login funcional',
                        actions: [
                            'Crear credenciales en Google Cloud Console',
                            'Configurar variables en Vercel',
                            'Agregar redirect URI',
                            'Probar login en producción'
                        ]
                    },
                    {
                        number: 5,
                        title: 'UI básica autenticada',
                        objective: 'Distinguir usuario logueado',
                        actions: [
                            'Crear botón login/logout',
                            'Mostrar nombre del usuario',
                            'Proteger ruta básica (si no está logueado → login)'
                        ]
                    }
                ]
            },
            {
                id: 'phase2',
                name: 'FASE 2: Base de datos + autos',
                daysRange: 'Día 6–10',
                color: 'yellow',
                days: [
                    {
                        number: 6,
                        title: 'Setup base de datos',
                        objective: 'DB conectada',
                        actions: [
                            'Crear DB (PostgreSQL)',
                            'Instalar Prisma',
                            'Configurar conexión'
                        ]
                    },
                    {
                        number: 7,
                        title: 'Modelo Usuario + Vehículo',
                        objective: 'Estructura de datos',
                        actions: [
                            'Crear modelo User',
                            'Crear modelo Vehicle',
                            'Relación usuario → vehículos',
                            'Ejecutar migración'
                        ]
                    },
                    {
                        number: 8,
                        title: 'Crear vehículo (backend)',
                        objective: 'Endpoint funcional',
                        actions: [
                            'Crear API route /api/vehicles',
                            'Método POST para crear vehículo',
                            'Validar datos básicos'
                        ]
                    },
                    {
                        number: 9,
                        title: 'Formulario crear auto',
                        objective: 'Crear autos desde UI',
                        actions: [
                            'Formulario simple: Marca, Modelo, Año',
                            'Conectar con API',
                            'Guardar en DB'
                        ]
                    },
                    {
                        number: 10,
                        title: 'Listado de autos',
                        objective: 'Ver autos creados',
                        actions: [
                            'Obtener vehículos del usuario',
                            'Mostrar lista básica',
                            'Verificar persistencia'
                        ]
                    }
                ]
            },
            {
                id: 'phase3',
                name: 'FASE 3: Mantenciones y gastos',
                daysRange: 'Día 11–15',
                color: 'orange',
                days: [
                    {
                        number: 11,
                        title: 'Modelo Mantención',
                        objective: 'Estructura mantenciones',
                        actions: [
                            'Crear modelo Maintenance',
                            'Relación con vehículo',
                            'Migración'
                        ]
                    },
                    {
                        number: 12,
                        title: 'Crear mantención',
                        objective: 'Registrar mantenciones',
                        actions: [
                            'API POST mantención',
                            'Formulario básico: Tipo, Fecha, Costo'
                        ]
                    },
                    {
                        number: 13,
                        title: 'Historial por vehículo',
                        objective: 'Visualizar mantenciones',
                        actions: [
                            'Mostrar mantenciones por auto',
                            'Ordenar por fecha',
                            'UI simple tipo lista'
                        ]
                    },
                    {
                        number: 14,
                        title: 'Modelo Gastos',
                        objective: 'Tracking financiero',
                        actions: [
                            'Crear modelo Expense',
                            'Relación con vehículo',
                            'Migración'
                        ]
                    },
                    {
                        number: 15,
                        title: 'Registrar gastos',
                        objective: 'Control de gastos',
                        actions: [
                            'Formulario gasto',
                            'Categoría (combustible, seguro, etc.)',
                            'Guardar en DB'
                        ]
                    }
                ]
            },
            {
                id: 'phase4',
                name: 'FASE 4: Dashboard + mejoras',
                daysRange: 'Día 16–20',
                color: 'blue',
                days: [
                    {
                        number: 16,
                        title: 'Dashboard básico',
                        objective: 'Vista general',
                        actions: [
                            'Total autos',
                            'Total gastos',
                            'Últimas mantenciones'
                        ]
                    },
                    {
                        number: 17,
                        title: 'Métricas simples',
                        objective: 'Valor real',
                        actions: [
                            'Gasto mensual',
                            'Gasto por vehículo',
                            'Cálculo básico'
                        ]
                    },
                    {
                        number: 18,
                        title: 'UI/UX mejora',
                        objective: 'Que se vea pro',
                        actions: [
                            'Layout tipo dashboard',
                            'Sidebar simple',
                            'Mejorar estilos (Tailwind)'
                        ]
                    },
                    {
                        number: 19,
                        title: 'Validaciones + bugs',
                        objective: 'Estabilidad',
                        actions: [
                            'Validar formularios',
                            'Manejar errores',
                            'Probar flujos completos'
                        ]
                    },
                    {
                        number: 20,
                        title: 'Deploy final + polish',
                        objective: 'Versión usable',
                        actions: [
                            'Revisar variables en Vercel',
                            'Deploy final',
                            'Probar todo end-to-end',
                            '(Opcional) compartir con alguien'
                        ]
                    }
                ]
            }
        ];

        let completedActions = {};
        let collapsedDays = {};

        function loadFromStorage() {
            const saved = localStorage.getItem('roadmapProgress');
            if (saved) {
                completedActions = JSON.parse(saved);
            }
            const collapsed = localStorage.getItem('roadmapCollapsed');
            if (collapsed) {
                collapsedDays = JSON.parse(collapsed);
            }
        }

        function saveToStorage() {
            localStorage.setItem('roadmapProgress', JSON.stringify(completedActions));
            localStorage.setItem('roadmapCollapsed', JSON.stringify(collapsedDays));
        }

        function toggleAction(dayNumber, actionIndex) {
            const key = `${dayNumber}-${actionIndex}`;
            if (completedActions[key]) {
                delete completedActions[key];
                delete collapsedDays[dayNumber];
            } else {
                completedActions[key] = true;
                const day = roadmapData.flatMap(p => p.days).find(d => d.number === dayNumber);
                if (day && isDayComplete(day)) {
                    collapsedDays[dayNumber] = true;
                }
            }
            saveToStorage();
            render();
        }

        function toggleDayCollapse(dayNumber) {
            const currentState = collapsedDays[dayNumber] === true;
            if (currentState) {
                delete collapsedDays[dayNumber];
            } else {
                collapsedDays[dayNumber] = true;
            }
            saveToStorage();
            render();
        }

        function isDayCollapsed(day) {
            return collapsedDays[day.number] === true;
        }

        function getDayProgress(day) {
            const total = day.actions.length;
            let completed = 0;
            day.actions.forEach((_, idx) => {
                if (completedActions[`${day.number}-${idx}`]) completed++;
            });
            return { completed, total };
        }

        function isDayComplete(day) {
            const { completed, total } = getDayProgress(day);
            return completed === total && total > 0;
        }

        function togglePhase(phaseId) {
            const content = document.getElementById(`phase-${phaseId}`);
            const header = document.querySelector(`#phase-${phaseId} .phase-header`);
            content.classList.toggle('open');
            header.classList.toggle('open');
        }

        function render() {
            const container = document.getElementById('phasesContainer');
            let totalCompleted = 0;
            let totalActions = 0;

            container.innerHTML = roadmapData.map(phase => {
                let phaseCompleted = 0;
                let phaseTotal = 0;
                
                phase.days.forEach(day => {
                    const { completed, total } = getDayProgress(day);
                    phaseCompleted += completed;
                    phaseTotal += total;
                });
                
                totalCompleted += phaseCompleted;
                totalActions += phaseTotal;
                
                return `
                    <div class="phase phase-${phase.color}" id="phase-${phase.id}">
                        <div class="phase-header open" onclick="togglePhase('${phase.id}')">
                            <div class="phase-title">
                                <span class="phase-badge">${phase.color === 'green' ? '🟢' : phase.color === 'yellow' ? '🟡' : phase.color === 'orange' ? '🟠' : '🔵'}</span>
                                <span class="phase-name">${phase.name}</span>
                                <span class="phase-days">${phase.daysRange}</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <span class="phase-progress">${phaseCompleted}/${phaseTotal}</span>
                                <span class="toggle-icon">▼</span>
                            </div>
                        </div>
                        <div class="phase-content open">
                            ${phase.days.map(day => {
                                const { completed, total } = getDayProgress(day);
                                const isComplete = isDayComplete(day);
                                const isCollapsed = isDayCollapsed(day);
                                return `
                                    <div class="day ${isComplete ? 'completed' : ''}">
                                        <div class="day-header">
                                            <div class="day-number">${day.number}</div>
                                            <div class="day-title">
                                                <h3>${day.title}</h3>
                                                <p>🎯 ${day.objective}</p>
                                            </div>
                                            <button type="button" class="day-toggle" onclick="toggleDayCollapse(${day.number})">
                                                ${isCollapsed ? '▶' : '▼'}
                                            </button>
                                        </div>
                                        <div class="actions ${isCollapsed ? 'collapsed' : ''}">
                                            <h4>Acciones: ${completed}/${total}</h4>
                                            <div class="actions-list">
                                                ${day.actions.map((action, idx) => `
                                                    <div class="action-item ${completedActions[`${day.number}-${idx}`] ? 'completed' : ''}" 
                                                         onclick="toggleAction(${day.number}, ${idx})">
                                                        <div class="action-checkbox ${completedActions[`${day.number}-${idx}`] ? 'checked' : ''}"></div>
                                                        ${action}
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('completedDays').textContent = totalCompleted;
            document.getElementById('progressPercent').textContent = Math.round((totalCompleted / totalActions) * 100) + '%';
        }

        function resetAll() {
            if (confirm('¿Estás seguro de que quieres reiniciar todo el progreso?')) {
                completedActions = {};
                collapsedDays = {};
                saveToStorage();
                render();
            }
        }

        loadFromStorage();
        render();
    </script>
</body>
</html>
